services:
  db:
    image: postgres:16
    container_name: homehub_postgres
    restart: always
    environment:
      POSTGRES_USER: homehub
      POSTGRES_PASSWORD: homehub123
      POSTGRES_DB: homehub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homehub -d homehub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
