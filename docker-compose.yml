services:
  db:
    image: postgres:16
    container_name: homehub_postgres
    restart: always
    environment:
      POSTGRES_USER: homehub
      POSTGRES_PASSWORD: homehub123
      POSTGRES_DB: homehub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homehub -d homehub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: homehub_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://homehub:homehub123@db:5432/homehub_db
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
